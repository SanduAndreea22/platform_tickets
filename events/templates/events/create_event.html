{% extends "base.html" %}
{% load static %}

{% block title %}Create Event{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/create_event.css' %}">
{% endblock %}

{% block content %}

<section class="create-event-section">

  <div class="create-event-card">

    <h2 class="create-event-title">
      🎤 Create a New Event
    </h2>

    <p class="create-event-subtitle">
      Fill in the event details and add ticket types.
    </p>

    <form method="POST" enctype="multipart/form-data" class="create-event-form">
      {% csrf_token %}

      <label>Event title</label>
      <input type="text" name="title" required>

      <label>Description</label>
      <textarea name="description" rows="4" required></textarea>

      <label>Location</label>
      <input type="text" name="location" required>

      <div class="form-grid">

        <div>
          <label>Start date</label>
          <input type="datetime-local" name="start_date" required>
        </div>

        <div>
          <label>End date</label>
          <input type="datetime-local" name="end_date" required>
        </div>

      </div>

      <label>Event image</label>
      <input type="file" name="image" accept="image/*">

      <div class="ticket-header">
        <h3>🎟️ Ticket Types</h3>

        <button type="button" id="add-ticket" class="add-ticket-btn">
          + Add ticket
        </button>
      </div>

      <div id="ticket-container">

        <div class="ticket-row">
          <input type="text" name="ticket_name" placeholder="Ticket name">
          <input type="number" name="ticket_price" step="0.01" placeholder="Price">
          <input type="number" name="ticket_quantity" placeholder="Quantity">
        </div>

      </div>

      <button type="submit" class="create-event-btn">
        Create Event
      </button>

    </form>

  </div>

</section>

<script>

document.getElementById("add-ticket").addEventListener("click", function(){

    const container = document.getElementById("ticket-container")

    const row = document.createElement("div")

    row.classList.add("ticket-row")

    row.innerHTML = `
        <input type="text" name="ticket_name" placeholder="Ticket name">
        <input type="number" name="ticket_price" step="0.01" placeholder="Price">
        <input type="number" name="ticket_quantity" placeholder="Quantity">
    `

    container.appendChild(row)

})

</script>

{% endblock %}
